<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central de Atendimento Nio</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0a0e27;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            width: 90%;
            max-width: 400px;
        }
        .card {
            background-color: #161b3d;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3 );
        }
        .btn {
            display: block;
            background-color: #25d366;
            color: white;
            text-decoration: none;
            padding: 12px;
            border-radius: 5px;
            font-weight: bold;
            margin-top: 10px;
        }
        h1 { font-size: 24px; margin-bottom: 5px; }
        p { font-size: 14px; color: #ccc; }
        h2 { font-size: 18px; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>SUPORTE AO CLIENTE</h1>
        <p>Escolha uma opção de atendimento</p>

        <div class="card">
            <h2>Atendimento</h2>
            <p>Fale com um atendente agora</p>
            <a href="https://wa.me/5598992425168" class="btn">Abrir WhatsApp</a>
        </div>

        <div class="card">
            <h2>Suporte Técnico</h2>
            <p>Internet lenta ou sem conexão</p>
            <a href="https://wa.me/5598992425168" class="btn">Solicitar Suporte</a>
        </div>

        <div class="card">
            <h2>Emitir</h2>
            <p>Atualização</p>
            <a href="https://wa.me/5598992425168" class="btn">Falar com Atendente</a>
        </div>
    </div>

</body>
</html>
